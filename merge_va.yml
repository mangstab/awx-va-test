---
- name: Merge VA JSON results (use artifacts from Collect node)
  hosts: localhost
  gather_facts: false

  vars:
    # Ambil dari Workflow Artifacts:
    # Templates → Node “Merge VA Results” → PROMPT vars below (optional)
    va_results_dir: "{{ job_artifacts['Collect VA Evidence'].va_results_dir }}"
    va_json_files: "{{ job_artifacts['Collect VA Evidence'].va_json_files }}"
    merged_file: "/runner/va_results/awx_va_merged.json"

  tasks:
    - name: Fail early if no artifacts
      fail:
        msg: "No VA JSON files from Collect job."
      when: va_json_files | default([]) | length == 0

    - name: Read each JSON and build merged array
      set_fact:
        merged_list: "{{ (merged_list | default([])) + [ lookup('file', item) | from_json ] }}"
      loop: "{{ va_json_files }}"

    - name: Write merged JSON
      copy:
        dest: "{{ merged_file }}"
        content: "{{ merged_list | to_nice_json }}"

    - name: Publish merged file path
      set_stats:
        data:
          merged_json_file: "{{ merged_file }}"
          merged_hosts_count: "{{ merged_list | length }}"
