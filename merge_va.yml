---
# Merge JSON from workflow artifacts (publish payload for downstream nodes)
- name: Merge VA JSON results (use artifacts from Collect node)
  hosts: localhost
  gather_facts: false

  vars:
    va_json_payloads: "{{ job_artifacts['Collect VA Evidence'].va_json_payloads | default([]) }}"
    va_json_files: "{{ job_artifacts['Collect VA Evidence'].va_json_files | default([]) }}"
    merged_file: "/runner/va_results/awx_va_merged.json"

  tasks:
    - name: Decide source data
      set_fact:
        merged_list: "{{ va_json_payloads if (va_json_payloads | length) > 0 else [] }}"

    - name: If no payloads, read each JSON file (legacy path)
      when: merged_list | length == 0
      set_fact:
        merged_list: "{{ (merged_list | default([])) + [ lookup('file', item) | from_json ] }}"
      loop: "{{ va_json_files }}"

    - name: Fail if still empty
      fail:
        msg: "No VA data available from Collect job (payloads/files missing)."
      when: merged_list | length == 0

    - name: Ensure output dir exists
      file:
        path: "{{ merged_file | dirname }}"
        state: directory
        mode: '0755'

    - name: Write merged JSON
      copy:
        dest: "{{ merged_file }}"
        content: "{{ merged_list | to_nice_json }}"

    - name: Publish merged file path + payload
      set_stats:
        data:
          merged_json_file: "{{ merged_file }}"
          merged_hosts_count: "{{ merged_list | length }}"
          merged_json_payload: "{{ merged_list }}"
