
---
# Render MD (v5): scan all job_artifacts nodes for merged_json_payload, then fallback to globals and file
- name: Render Multi-Server VA Report (Markdown)
  hosts: localhost
  gather_facts: false

  vars:
    title: "Internal Vulnerability Assessment – Multi-Server"

  tasks:
    - name: Capture job_artifacts (may be empty on some setups)
      set_fact:
        _artifacts: "{{ job_artifacts | default({}, true) }}"

    - name: Derive payload candidates from any node
      set_fact:
        _payload_candidates: >-
          {{ (_artifacts.values() | list | map('dict2items') | list
              | map('selectattr','key','equalto','merged_json_payload')
              | map('list') | list
              | sum(start=[])
              | map(attribute='value') | list) | default([]) }}
        _file_candidates: >-
          {{ (_artifacts.values() | list | map('dict2items') | list
              | map('selectattr','key','equalto','merged_json_file')
              | map('list') | list
              | sum(start=[])
              | map(attribute='value') | list) | default([]) }}

    - name: Include global keys (if present)
      set_fact:
        _payload_candidates: "{{ _payload_candidates + [ _artifacts.get('merged_json_payload', []) ] }}"
        _file_candidates: "{{ _file_candidates + [ _artifacts.get('merged_json_file', '') ] }}"

    - name: Pick first non-empty payload or file
      set_fact:
        va_data: "{{ (_payload_candidates | select('length') | list | first) | default([]) }}"
        merged_file: "{{ (_file_candidates | select('string') | select('length') | list | first) | default(lookup('env','MERGED_JSON_FILE') | default('/runner/va_results/awx_va_merged.json', true)) }}"

    - name: If payload is empty, try file path
      when: (va_data | length) == 0
      stat:
        path: "{{ merged_file }}"
      register: mf

    - name: Fail if neither payload nor file available
      when: (va_data | length) == 0 and (not mf.stat.exists)
      fail:
        msg: >-
          No VA data to render. job_artifacts keys={{ _artifacts.keys() | list }}; tried payloads on all nodes and file {{ merged_file }}.

    - name: Read merged JSON from file when payload empty but file exists
      when: (va_data | length) == 0 and mf.stat.exists
      set_fact:
        va_data: "{{ lookup('file', merged_file) | from_json }}"

    - name: Build report path with timestamp
      set_fact:
        report_md: "/runner/va_results/VA_Report_{{ lookup('pipe','date +%Y-%m-%d_%H%M%S') }}.md"

    - name: Render Markdown
      template:
        src: "report.md.j2"
        dest: "{{ report_md }}"
      vars:
        title: "{{ title }}"
        va_data: "{{ va_data }}"

    - name: Publish report path
      set_stats:
        data:
          va_report_md: "{{ report_md }}"
