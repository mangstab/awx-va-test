---
# Render MD from merged JSON or payload (no filesystem dependency)
- name: Render Multi-Server VA Report (Markdown)
  hosts: localhost
  gather_facts: false

  vars:
    title: "Internal Vulnerability Assessment – Multi-Server"

  tasks:
    - name: Resolve artifacts object (or empty)
      set_fact:
        _artifacts: "{{ job_artifacts | default({}, true) }}"

    - name: Extract payload and file hints
      set_fact:
        _payload: "{{ (_artifacts.get('Merge VA Result', {}) ).get('merged_json_payload', _artifacts.get('merged_json_payload', [])) }}"
        _file: "{{ (_artifacts.get('Merge VA Result', {}) ).get('merged_json_file', _artifacts.get('merged_json_file', '')) }}"

    - name: Decide source
      set_fact:
        use_payload: "{{ (_payload | length) > 0 }}"
        merged_file: "{{ _file if _file else (lookup('env','MERGED_JSON_FILE') | default('/runner/va_results/awx_va_merged.json', true)) }}"

    - name: When using payload, set va_data directly
      when: use_payload
      set_fact:
        va_data: "{{ _payload }}"

    - name: When using file, validate exists
      when: not use_payload
      stat:
        path: "{{ merged_file }}"
      register: mf

    - name: Fail if merged file missing (file mode)
      when: not use_payload and (not mf.stat.exists)
      fail:
        msg: "Merged JSON file not found: {{ merged_file }}"

    - name: Read merged JSON (file mode)
      when: not use_payload
      set_fact:
        va_data: "{{ lookup('file', merged_file) | from_json }}"

    - name: Build report path with timestamp
      set_fact:
        report_md: "/runner/va_results/VA_Report_{{ lookup('pipe','date +%Y-%m-%d_%H%M%S') }}.md"

    - name: Render Markdown
      template:
        src: "report.md.j2"
        dest: "{{ report_md }}"
      vars:
        title: "{{ title }}"
        va_data: "{{ va_data }}"

    - name: Publish report path
      set_stats:
        data:
          va_report_md: "{{ report_md }}"
