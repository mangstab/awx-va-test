---
- name: Collect VA Evidence (per host)
  hosts: all
  gather_facts: true
  become: false

  vars:
    va_remote_dir: "/tmp/awx_va"
    va_results_dir: "/runner/va_results"   # gunakan path yang ada di setiap EE container
    security_status_cmd: "pro security-status || ubuntu-security-status || true"
    use_sudo_for_network_checks: true

  tasks:
    - name: Ensure remote VA dir exists
      file:
        path: "{{ va_remote_dir }}"
        state: directory
        mode: '0755'

    - name: Read /etc/os-release
      shell: "cat /etc/os-release || true"
      register: osrelease

    - name: Read kernel version
      command: uname -a
      register: kernel

    - name: Refresh apt cache (non-fatal)
      command: apt-get update -y
      register: aptupdate
      changed_when: false
      failed_when: false

    - name: List upgradable packages
      shell: "apt list --upgradable 2>/dev/null || true"
      register: upgradable

    - name: Read open ports (ss)
      shell: "ss -tulnp || true"
      register: ports
      become: "{{ use_sudo_for_network_checks }}"
      changed_when: false
      failed_when: false

    - name: Read SSHD effective config
      shell: "sshd -T || true"
      register: sshd

    - name: Read systemd services
      shell: "systemctl list-units --type=service --no-pager || true"
      register: services
      become: "{{ use_sudo_for_network_checks }}"
      changed_when: false
      failed_when: false

    - name: Read Ubuntu security status
      shell: "{{ security_status_cmd }}"
      register: secstat

    - name: Write per-host VA JSON to remote
      copy:
        dest: "{{ va_remote_dir }}/va_{{ inventory_hostname }}.json"
        content: |
          {
            "host": "{{ inventory_hostname }}",
            "ip": "{{ ansible_default_ipv4.address | default(hostvars[inventory_hostname].ansible_host | default('')) }}",
            "os_release": {{ osrelease.stdout | to_json }},
            "kernel": {{ kernel.stdout | to_json }},
            "upgradable": {{ upgradable.stdout | to_json }},
            "ports": {{ ports.stdout | to_json }},
            "sshd_T": {{ sshd.stdout | to_json }},
            "services": {{ services.stdout | to_json }},
            "security_status": {{ secstat.stdout | to_json }},
            "collected_at": "{{ ansible_date_time.iso8601 }}"
          }

    - name: Ensure controller result dir exists
      delegate_to: localhost
      file:
        path: "{{ va_results_dir }}"
        state: directory
        mode: '0755'

    - name: Fetch JSON to controller
      fetch:
        src: "{{ va_remote_dir }}/va_{{ inventory_hostname }}.json"
        dest: "{{ va_results_dir }}/"
        flat: yes

# Publish artifacts di node localhost (sekali saja)
- name: Publish VA files list (Artifacts)
  hosts: localhost
  gather_facts: false
  vars:
    va_results_dir: "/runner/va_results"
  tasks:
    - name: Build glob list of collected JSON
      set_fact:
        va_json_files: "{{ query('fileglob', va_results_dir ~ '/va_*.json') }}"

    - name: Publish artifacts for workflow
      set_stats:
        data:
          va_results_dir: "{{ va_results_dir }}"
          va_json_files: "{{ va_json_files }}"
          va_hosts_count: "{{ va_json_files | length }}"
