
---
# Collect VA Evidence and publish artifacts (Option A: store files under artifact_dir)
- name: Collect VA Evidence (per host)
  hosts: all
  gather_facts: true
  become: false

  vars:
    va_remote_dir: "/tmp/awx_va"
    security_status_cmd: "pro security-status || ubuntu-security-status || true"
    use_sudo_for_network_checks: true

  tasks:
    - name: Ensure remote VA dir exists
      file:
        path: "{{ va_remote_dir }}"
        state: directory
        mode: '0755'

    - name: Read /etc/os-release
      shell: "cat /etc/os-release || true"
      register: osrelease
      changed_when: false

    - name: Read kernel version
      command: uname -a
      register: kernel
      changed_when: false

    - name: Refresh apt cache (non-fatal)
      command: apt-get update -y
      register: aptupdate
      changed_when: false
      failed_when: false

    - name: List upgradable packages
      shell: "apt list --upgradable 2>/dev/null || true"
      register: upgradable
      changed_when: false

    - name: Read open ports (ss)
      shell: "ss -tulnp || true"
      register: ports
      become: "{{ use_sudo_for_network_checks }}"
      changed_when: false
      failed_when: false

    - name: Read SSHD effective config
      shell: "sshd -T || true"
      register: sshd
      changed_when: false

    - name: Read systemd services
      shell: "systemctl list-units --type=service --no-pager || true"
      register: services
      become: "{{ use_sudo_for_network_checks }}"
      changed_when: false
      failed_when: false

    - name: Read Ubuntu security status
      shell: "{{ security_status_cmd }}"
      register: secstat
      changed_when: false

    - name: Write per-host VA JSON to remote
      copy:
        dest: "{{ va_remote_dir }}/va_{{ inventory_hostname }}.json"
        content: |
          {
            "host": "{{ inventory_hostname }}",
            "ip": "{{ ansible_default_ipv4.address | default(hostvars[inventory_hostname].ansible_host | default('')) }}",
            "os_release": {{ osrelease.stdout | to_json }},
            "kernel": {{ kernel.stdout | to_json }},
            "upgradable": {{ upgradable.stdout | to_json }},
            "ports": {{ ports.stdout | to_json }},
            "sshd_T": {{ sshd.stdout | to_json }},
            "services": {{ services.stdout | to_json }},
            "security_status": {{ secstat.stdout | to_json }},
            "collected_at": "{{ ansible_date_time.iso8601 }}"
          }

    # ========= Controller-side stage (artifacts) =========
- name: Publish VA files list (Artifacts)
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Discover AWX job id from environment
      set_fact:
        _awx_job_id: >-
          {{ lookup('env','AWX_JOB_ID')
             | default(lookup('env','JOB_ID'), true)
             | default(tower_job_id | default(job_id, true), true) }}

    - name: Define artifact_dir path
      set_fact:
        artifact_dir: "/runner/artifacts/{{ _awx_job_id }}"

    - name: Ensure artifact_dir exists (on controller)
      file:
        path: "{{ artifact_dir }}"
        state: directory
        mode: '0755'

    - name: Fetch JSON to controller artifacts (store under artifact_dir)
      delegate_to: "{{ item }}"
      fetch:
        src: "/tmp/awx_va/va_{{ hostvars[item].inventory_hostname }}.json"
        dest: "{{ artifact_dir }}/"
        flat: yes
      loop: "{{ groups['all'] | default([]) }}"

    - name: Find VA JSON files in artifact dir
      find:
        paths: "{{ artifact_dir }}"
        patterns: "va_*.json"
        file_type: file
      register: found_artifacts

    - name: Publish artifacts for workflow
      set_stats:
        data:
          va_artifact_dir: "{{ artifact_dir }}"
          va_json_files: "{{ found_artifacts.files | map(attribute='path') | list }}"
          va_hosts_count: "{{ (found_artifacts.files | length) | string }}"
